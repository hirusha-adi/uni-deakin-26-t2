<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ice Cream Membership Registration Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <div>Ice Cream</div>
      <div>Order online</div>
    </div>
  </header>

  <section class="hero">
    <h1>World of Ice Cream</h1>
    <p>Order your delicious ice cream here and it will be ready in a snap!</p>
  </section>

  <main class="page">
    <section class="card">
      <h2>Membership Registration Form</h2>

      <form>
        <fieldset>
          <legend>Login details to be used</legend>

          <div class="grid-two">
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>

            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Contact Details</legend>

          <div class="grid-two">
            <div class="field">
              <label for="firstName">Firstname</label>
              <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="field">
              <label for="surname">Surname</label>
              <input type="text" id="surname" name="surname" required>
            </div>

            <div class="field">
              <label for="mobile">Mobile</label>
              <input type="tel" id="mobile" name="mobile" placeholder="10 digits" inputmode="numeric" maxlength="10"
                pattern="[0-9]{10}" required>
            </div>

            <div class="field">
              <label for="birthDate">Birth Date</label>
              <input type="date" id="birthDate" name="birthDate" required>
            </div>

            <div class="field full">
              <label for="address">Address</label>
              <input type="text" id="address" name="address" required>
            </div>

            <div class="field full">
              <label for="address2">Address 2</label>
              <input type="text" id="address2" name="address2" placeholder="Apartment, studio, or floor">
            </div>

            <div class="grid-three full">
              <div class="field">
                <label for="city">City</label>
                <input type="text" id="city" name="city" required>
              </div>

              <div class="field">
                <label for="state">State</label>
                <select id="state" name="state" required>
                  <option value="">Choose...</option>
                  <option value="ACT">Australian Capital Territory</option>
                  <option value="NSW">New South Wales</option>
                  <option value="NT">Northern Territory</option>
                  <option value="QLD">Queensland</option>
                  <option value="SA">South Australia</option>
                  <option value="TAS">Tasmania</option>
                  <option value="VIC">Victoria</option>
                  <option value="WA">Western Australia</option>
                </select>
              </div>

              <div class="field">
                <label for="postcode">Postcode</label>
                <input type="text" id="postcode" name="postcode" inputmode="numeric" maxlength="4" pattern="[0-9]{4}"
                  required>
              </div>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Ice Cream Preferences</legend>

          <div class="grid-two">
            <div class="field">
              <label for="favourite">Favourite(s)</label>
              <select id="favourite" name="favourite" multiple size="4" required>
                <option value="vanilla">Vanilla</option>
                <option value="chocolate">Chocolate</option>
                <option value="strawberry">Strawberry</option>
                <option value="caramel">Caramel</option>
                <option value="cookies-cream">Cookies and Cream</option>
                <option value="mint">Mint Chocolate Chip</option>
              </select>
            </div>

            <div class="field">
              <label for="type">Preferred Type</label>
              <select id="type" name="type" size="4" required>
                <option value="traditional-cone">Traditional Cone</option>
                <option value="waffle-cone">Waffle Cone</option>
                <option value="cup">Cup</option>
                <option value="soft-serve">Soft Serve</option>
              </select>
            </div>

            <div class="field full">
              <label>Preferred Size</label>

              <div class="inline-group">
                <label>
                  <input type="radio" name="size" value="petite" required>
                  Petite<br>(extra-small) serve
                </label>

                <label>
                  <input type="radio" name="size" value="small">
                  Small<br>serve
                </label>

                <label>
                  <input type="radio" name="size" value="regular">
                  Regular<br>Serve
                </label>

                <label>
                  <input type="radio" name="size" value="jumbo">
                  Jumbo<br>Serve
                </label>
              </div>
            </div>

            <div class="field full">
              <label for="message">Leave us a message</label>
              <textarea id="message" name="message"></textarea>
            </div>

            <div class="field full">
              <label>Ice Cream Preferences</label>

              <div class="inline-group small-options">
                <label>
                  <input type="checkbox" name="remember">
                  Remember<br>me
                </label>

                <label>
                  <input type="checkbox" name="newsletter">
                  Sign up for our<br>Monthly<br>Newsletter!
                </label>
              </div>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <button class="primary" type="submit">Submit</button>
          <button class="secondary" type="reset">Reset</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">© 2024 Ice Cream made chilled!</footer>
</body>

</html>
