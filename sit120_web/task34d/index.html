<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3.4D</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 p-4 bg-white">

    <div class="max-w-7xl mx-auto space-y-4">

        <!-- Header -->
        <header class="bg-blue-200 border-2 border-gray-500 h-28 flex items-center justify-center">
            <h1 class="text-white text-4xl tracking-widest">Header</h1>
        </header>

        <!-- Navigation -->
        <nav class="bg-blue-200 border-2 border-gray-500 h-16 flex items-center justify-center">
            <h2 class="text-white text-2xl tracking-widest">Navigation Menu</h2>
        </nav>

        <!-- Main layout -->
        <main class="grid grid-cols-1 md:grid-cols-[1fr_3fr_1fr] gap-4">

            <!-- Content 1 -->
            <section class="bg-blue-200 border-2 border-gray-500 h-48 md:h-[420px] flex items-center justify-center">
                <h2 class="text-white text-3xl tracking-widest">Content 1</h2>
            </section>

            <!-- Main Content -->
            <section class="bg-blue-200 border-2 border-gray-500 h-48 md:h-[420px] flex items-center justify-center">
                <h2 class="text-white text-4xl tracking-widest">Main Content</h2>
            </section>

            <!-- Content 2 -->
            <aside class="bg-blue-200 border-2 border-gray-500 h-48 md:h-[420px] flex items-center justify-center">
                <h2 class="text-white text-3xl tracking-widest">Content 2</h2>
            </aside>

        </main>

        <!-- Footer -->
        <footer class="bg-blue-200 border-2 border-gray-500 h-16 flex items-center justify-center">
            <h2 class="text-white text-2xl tracking-widest">Footer</h2>
        </footer>

    </div>

</body>
</html>
