<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lens: {
              teal: "#155E63",
              cream: "#F6F3EA",
              orange: "#B64900",
              ink: "#17383A",
              pale: "#E5EFEC"
            }
          }
        }
      }
    }
  </script>

  <title>LabelLens — Home Wireframe</title>
</head>

<body class="min-h-screen bg-lens-cream text-lens-ink">
  <div class="mx-auto min-h-screen max-w-7xl bg-white shadow-sm">
    <header class="flex items-center justify-between border-b border-stone-200 px-5 py-4 md:px-10">
      <a href="index.html" class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-lens-teal"></div>
        <span class="font-semibold">LabelLens</span>
      </a>

      <nav class="hidden items-center gap-7 text-sm md:flex">
        <a href="index.html">Home</a>
        <a href="scan-confirm.html">Scan</a>
        <a href="additive-results.html">Compare</a>
        <div class="h-9 w-24 rounded-full bg-lens-teal"></div>
      </nav>

      <div class="h-10 w-10 rounded-xl border border-stone-300 md:hidden"></div>
    </header>

    <main>
      <section class="px-5 py-8 md:px-10 md:py-14">
        <div class="grid overflow-hidden rounded-[2rem] bg-lens-pale lg:grid-cols-2">
          <div class="flex min-h-[420px] flex-col justify-center p-8 md:p-14">
            <span class="mb-5 w-fit rounded-full border border-lens-teal/30 px-4 py-2 text-xs">
              Hero
            </span>
            <div class="h-12 w-5/6 rounded-xl bg-lens-teal md:h-16"></div>
            <div class="mt-4 h-12 w-3/5 rounded-xl bg-lens-teal/80 md:h-16"></div>

            <div class="mt-8 space-y-3">
              <div class="h-4 w-full rounded bg-lens-teal/15"></div>
              <div class="h-4 w-4/5 rounded bg-lens-teal/15"></div>
            </div>

            <div class="mt-8 flex flex-wrap gap-3">
              <a href="scan-confirm.html" class="rounded-full bg-lens-orange px-7 py-3 text-sm font-medium text-white">
                Scan label
              </a>
              <a href="#search" class="rounded-full border border-lens-teal px-7 py-3 text-sm font-medium">
                Search
              </a>
            </div>
          </div>

          <div class="min-h-[340px] bg-lens-teal p-8 md:min-h-[500px] md:p-12">
            <div class="flex h-full min-h-[300px] items-center justify-center rounded-[2rem] border-2 border-dashed border-white/50">
              <span class="rounded-full bg-white/10 px-5 py-2 text-sm text-white">
                Main image
              </span>
            </div>
          </div>
        </div>
      </section>

      <section id="search" class="px-5 pb-10 md:px-10 md:pb-16">
        <div class="rounded-[2rem] border border-stone-200 bg-white p-6 md:p-10">
          <div class="mb-7 flex items-end justify-between gap-6">
            <div>
              <p class="text-xs uppercase tracking-[0.2em] text-lens-orange">Search area</p>
              <div class="mt-3 h-8 w-52 rounded-lg bg-lens-teal"></div>
            </div>
            <div class="hidden h-10 w-28 rounded-full bg-lens-pale md:block"></div>
          </div>

          <div class="grid gap-4 lg:grid-cols-[1fr_auto]">
            <div class="min-h-16 rounded-2xl border border-stone-300 bg-stone-50 p-3">
              <div class="flex flex-wrap gap-2">
                <div class="h-9 w-24 rounded-full bg-lens-pale"></div>
                <div class="h-9 w-32 rounded-full bg-lens-pale"></div>
                <div class="h-9 w-20 rounded-full bg-lens-pale"></div>
              </div>
            </div>
            <a href="additive-results.html" class="flex min-h-16 items-center justify-center rounded-2xl bg-lens-teal px-8 text-sm font-medium text-white">
              Continue
            </a>
          </div>
        </div>
      </section>

      <section class="bg-lens-cream px-5 py-12 md:px-10 md:py-16">
        <div class="mb-8 flex items-center justify-between">
          <div class="h-8 w-48 rounded-lg bg-lens-teal"></div>
          <div class="hidden h-4 w-32 rounded bg-stone-300 md:block"></div>
        </div>

        <div class="grid gap-5 md:grid-cols-3">
          <div class="rounded-3xl bg-white p-6">
            <div class="mb-8 h-14 w-14 rounded-2xl bg-lens-pale"></div>
            <div class="h-5 w-32 rounded bg-lens-teal"></div>
            <div class="mt-4 h-3 w-full rounded bg-stone-200"></div>
            <div class="mt-2 h-3 w-4/5 rounded bg-stone-200"></div>
          </div>
          <div class="rounded-3xl bg-white p-6">
            <div class="mb-8 h-14 w-14 rounded-2xl bg-lens-pale"></div>
            <div class="h-5 w-32 rounded bg-lens-teal"></div>
            <div class="mt-4 h-3 w-full rounded bg-stone-200"></div>
            <div class="mt-2 h-3 w-4/5 rounded bg-stone-200"></div>
          </div>
          <div class="rounded-3xl bg-white p-6">
            <div class="mb-8 h-14 w-14 rounded-2xl bg-lens-pale"></div>
            <div class="h-5 w-32 rounded bg-lens-teal"></div>
            <div class="mt-4 h-3 w-full rounded bg-stone-200"></div>
            <div class="mt-2 h-3 w-4/5 rounded bg-stone-200"></div>
          </div>
        </div>
    </main>

    <footer class="border-t border-stone-200 px-5 py-8 md:px-10">
      <div class="grid gap-8 md:grid-cols-4">
        <div class="space-y-3">
          <div class="h-9 w-28 rounded-lg bg-lens-teal"></div>
          <div class="h-3 w-full rounded bg-stone-200"></div>
          <div class="h-3 w-2/3 rounded bg-stone-200"></div>
        </div>
        <div class="space-y-3">
          <div class="h-4 w-20 rounded bg-stone-300"></div>
          <div class="h-3 w-24 rounded bg-stone-200"></div>
          <div class="h-3 w-20 rounded bg-stone-200"></div>
        </div>
        <div class="space-y-3">
          <div class="h-4 w-20 rounded bg-stone-300"></div>
          <div class="h-3 w-24 rounded bg-stone-200"></div>
          <div class="h-3 w-20 rounded bg-stone-200"></div>
        </div>
        <div class="space-y-3">
          <div class="h-4 w-20 rounded bg-stone-300"></div>
          <div class="h-10 w-full rounded-full border border-stone-300"></div>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
