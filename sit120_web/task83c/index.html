<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 7.3C</title>

    <!-- Google's LibPhonenumber: https://www.jsdelivr.com/package/npm/google-libphonenumber -->
    <script src="https://cdn.jsdelivr.net/npm/google-libphonenumber@latest/dist/libphonenumber.min.js"></script>
    <!-- Validator JS: https://www.jsdelivr.com/package/npm/validator -->
    <script src="https://cdn.jsdelivr.net/npm/validator@13.15.35/validator.min.js"></script>
    <!-- My Code -->
    <script src="script.js"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
        }

        .page-title {
            font-size: 42px;
            letter-spacing: 4px;
            font-weight: 500;
        }

        .message {
            font-size: 14px;
            font-style: italic;
            padding-top: 8px;
        }

        .form-label {
            font-size: 16px;
        }

        .form-control {
            max-width: 300px;
        }
    </style>
</head>

<body>
    <main class="container mt-4">
        <h1 class="page-title">FORM VALIDATION</h1>

        <h2 class="fs-3 fw-semibold mt-2">Online Form Validation</h2>

        <p class="fs-5 mt-3">
            Please enter your contact details into the form below to register your interest in receiving support
            <br>
            with a given unit. Please make sure you use the correct format when inputting your data.
        </p>

        <!-- https://getbootstrap.com/docs/5.3/forms/overview/ -->
        <form id="studentForm" onsubmit="validation(event)" onreset="clearMessages()">
            <div class="row align-items-center mb-3">
                <label for="name" class="col-sm-2 col-form-label form-label">Name:</label>
                <div class="col-sm-4">
                    <input type="text" id="name" class="form-control" placeholder="Your name">
                </div>
                <div class="col-sm-5">
                    <span id="namemsg" class="message"></span>
                </div>
            </div>

            <div class="row align-items-center mb-3">
                <label for="email" class="col-sm-2 col-form-label form-label">Email:</label>
                <div class="col-sm-4">
                    <input type="text" id="email" class="form-control" placeholder="Enter email">
                </div>
                <div class="col-sm-5">
                    <span id="emailmsg" class="message"></span>
                </div>
            </div>

            <div class="row align-items-center mb-3">
                <label for="unit" class="col-sm-2 col-form-label form-label">Deakin Unit:</label>
                <div class="col-sm-4">
                    <input type="text" id="unit" class="form-control" placeholder="Unit Code">
                </div>
                <div class="col-sm-5">
                    <span id="unitmsg" class="message"></span>
                </div>
            </div>

            <div class="row align-items-center mb-3">
                <label for="phone" class="col-sm-2 col-form-label form-label">Phone:</label>
                <div class="col-sm-4">
                    <input type="text" id="phone" class="form-control" placeholder="Phone Number">
                </div>
                <div class="col-sm-5">
                    <span id="phonemsg" class="message"></span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Submit Query</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
        </form>
    </main>

</body>
</html>
